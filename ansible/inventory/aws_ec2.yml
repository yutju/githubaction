plugin: amazon.aws.aws_ec2
regions:
  - ap-northeast-2

# 1. SixSense 프로젝트의 실행 중인 인스턴스만 필터링
filters:
  tag:Project: SixSense
  instance-state-name: [running]

# 2. 테라폼의 'Role' 태그 값으로 앤서블 그룹 생성 (예: @master, @worker, @bastion)
keyed_groups:
  - key: tags.Role
    prefix: ""
    separator: ""

# 3. 내부망 접속이므로 private_ip_address를 호스트 이름으로 사용
hostnames:
  - private-ip-address

# 4. 접속에 필요한 공인/사설 IP 변수 정의
compose:
  ansible_host: private_ip_address
  # Bastion의 공인 IP를 변수로 담아둡니다 (ProxyCommand용)
  public_ip: public_ip_address
