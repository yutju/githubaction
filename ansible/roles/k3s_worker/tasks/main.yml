---
# 1. 마스터 노드에서 토큰을 성공적으로 가져왔는지 먼저 확인합니다.
- name: 마스터 join_token 변수 존재 확인
  fail:
    msg: "마스터 노드의 join_token을 찾을 수 없습니다. site.yml에서 마스터 플레이가 먼저 실행되었는지 확인하세요."
  when: hostvars[groups['master'][0]]['join_token'] is undefined
  tags: [ k3s_worker, check ]

# 2. 마스터의 API 서버가 통신 가능한 상태인지 확인 (방화벽/보안그룹 체크)
- name: 마스터 API 서버(6443) 준비 대기
  wait_for:
    host: "{{ hostvars[groups['master'][0]]['ansible_host'] }}"
    port: 6443
    state: started
    timeout: 300
  tags: [ k3s_worker, wait ]

# 3. 바이너리 존재 여부 확인
- name: K3s 워커 바이너리 존재 여부 확인
  stat:
    path: /usr/local/bin/k3s
  register: k3s_bin_worker
  tags: [ k3s_worker, k3s_join ]

# 4. K3s 워커 설치 및 클러스터 조인
# sh -s - agent 옵션을 추가하여 명확하게 에이전트 모드로 실행합니다.
- name: K3s 워커 노드 설치 및 클러스터 조인
  shell: |
    curl -sfL https://get.k3s.io | \
    K3S_URL=https://{{ hostvars[groups['master'][0]]['ansible_host'] }}:6443 \
    K3S_TOKEN={{ hostvars[groups['master'][0]]['join_token'] }} \
    sh -s - agent
  args:
    creates: /etc/systemd/system/k3s-agent.service
  when: not k3s_bin_worker.stat.exists
  notify:
    - daemon-reload
    - restart k3s-agent
  tags: [ k3s_worker, k3s_join ]

# 5. 서비스 상태 강제 유지 (장애 발생 시 자동 복구 핵심)
- name: K3s 에이전트 서비스 활성화 및 상태 유지
  service:
    name: k3s-agent
    state: started
    enabled: yes
  tags: [ k3s_worker, service ]
