name: SixSense Infra Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 테라폼 설치 (이 단계가 추가되었습니다! 🎖️)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0" # 준수님의 로컬 버전과 맞추면 더 좋습니다.

      # 3. AWS 인증 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 4. 테라폼 실행
      - name: Terraform Init & Plan
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan
          # 실제 배포 준비가 되면 아래 주석을 해제하세요!
          # terraform apply -auto-approve

      # 5. 앤서블 설치 및 SSH 설정 (설치 단계 강화 🎖️)
      - name: Setup Ansible and SSH
        run: |
          # 5-1. 앤서블 및 AWS 관련 라이브러리 설치
          sudo apt-get update
          sudo apt-get install -y ansible
          pip install boto3 botocore

          # 5-2. SSH 개인 키 파일 생성 (Secrets에서 가져옴)
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 5-3. SSH 접속 설정 (ansible.cfg 자동 생성)
          # 인프라 자동화 시 호스트 키 확인을 건너뛰도록 설정합니다.
          echo "[defaults]" > ansible.cfg
          echo "host_key_checking = False" >> ansible.cfg
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. 앤서블 실행
      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          # 앤서블 설정 파일(ansible.cfg)이 있는 경로를 환경변수로 잡아주면 좋습니다.
          export ANSIBLE_CONFIG=$GITHUB_WORKSPACE/ansible.cfg
          ansible-playbook -i inventory/aws_ec2.yml site.yml
