name: SixSense Infra Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 3. AWS 인증 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 4. 테라폼 실행
      - name: Terraform Init & Plan
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan
          terraform apply -auto-approve

      # 5. 앤서블 설치 및 파이썬 의존성 해결 (핵심 수정 사항 🎖️)
      - name: Setup Ansible and SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          
          # 앤서블이 인식할 수 있도록 파이썬 모듈 직접 설치
          python3 -m pip install --upgrade pip
          python3 -m pip install boto3 botocore

          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 앤서블이 어떤 파이썬을 사용할지 ansible.cfg에 명시적으로 기록
          echo "[defaults]" > ansible.cfg
          echo "host_key_checking = False" >> ansible.cfg
          echo "interpreter_python = /usr/bin/python3" >> ansible.cfg
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. 앤서블 실행
      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          # 5번 단계에서 생성한 ansible.cfg를 환경변수로 연결
          export ANSIBLE_CONFIG=$GITHUB_WORKSPACE/ansible.cfg
          ansible-playbook -i inventory/aws_ec2.yml site.yml
