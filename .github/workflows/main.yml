name: SixSense Infra Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 3. AWS 인증 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 4. 테라폼 실행
      - name: Terraform Init & Plan
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan
          terraform apply -auto-approve

      # 5. 앤서블 설치 및 '격리된 환경'에 의존성 주입 (필살기 🎖️)
      - name: Setup Ansible and SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          
          # [핵심] 앤서분 전용 가상환경(pipx) 내부에 boto3를 강제로 주입합니다.
          # 이 방법이 현재 발생하는 "Failed to import boto3" 에러를 잡는 유일한 정석입니다.
          pipx inject ansible-core boto3 botocore --include-apps

          # SSH 키 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 실행 폴더 내에 설정 파일 생성
          cat <<EOF > ./ansible/ansible.cfg
          [defaults]
          host_key_checking = False
          # 앤서블이 설치된 가상환경 내의 파이썬을 자동으로 쓰도록 설정
          interpreter_python = auto_silent
          inventory = ./inventory/aws_ec2.yml
          EOF
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. 앤서블 실행
      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          # 이미 ./ansible/ansible.cfg에 인벤토리 경로가 있으므로 실행만 하면 됩니다.
          ansible-playbook site.yml
