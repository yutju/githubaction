name: SixSense Infra Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 테라폼 설치
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # 3. AWS 인증 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 4. 테라폼 실행
      - name: Terraform Init & Plan
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan
          terraform apply -auto-approve

      # 5. 앤서블 설치 및 의존성 주입 (경로 최적화 🎖️)
      - name: Setup Ansible and SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          
          # 앤서블이 사용하는 환경에 boto3 설치
          python3 -m pip install --upgrade pip
          python3 -m pip install boto3 botocore

          # SSH 키 설정
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # [핵심] 실행 폴더인 ./ansible 안에 ansible.cfg를 생성합니다.
          # 이렇게 하면 앤서블이 실행될 때 이 파일을 1순위로 읽습니다.
          cat <<EOF > ./ansible/ansible.cfg
          [defaults]
          host_key_checking = False
          interpreter_python = /usr/bin/python3
          inventory = ./inventory/aws_ec2.yml
          EOF
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 6. 앤서블 실행
      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          # 이미 ./ansible 폴더 안에 설정파일이 있으므로 매우 심플해집니다.
          ansible-playbook site.yml
