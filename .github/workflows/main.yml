name: SixSense Infra Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  infra-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. AWS 인증 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 3. 테라폼 실행
      - name: Terraform Init & Plan
        working-directory: ./terraform
        run: |
          terraform init
          terraform plan
          # 실제 배포 시에는 아래 주석을 해제하세요!
          # terraform apply -auto-approve

      # 4. 앤서블 실행을 위한 의존성 및 SSH 키 설정 (추가됨 🎖️)
      - name: Setup Ansible and SSH
        run: |
          # 4-1. AWS 동적 인벤토리 사용을 위한 Python 라이브러리 설치
          pip install boto3 botocore
          
          # 4-2. SSH 개인 키 파일 생성 (Secrets에서 가져옴)
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 4-3. SSH 접속 시 호스트 키 확인 생략 설정 (자동화 필수)
          echo "host_key_checking = False" > ansible.cfg
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 5. 앤서블 실행 (동적 인벤토리 적용)
      - name: Run Ansible Playbook
        working-directory: ./ansible
        run: |
          # 인벤토리 파일 경로를 프로젝트 구조에 맞춰 확인하세요 (inventory/aws_ec2.yml)
          ansible-playbook -i inventory/aws_ec2.yml site.yml
